version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wellsync_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wellsync
      POSTGRES_PASSWORD: wellsync123
      POSTGRES_DB: wellsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
